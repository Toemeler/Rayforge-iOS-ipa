api_version: 1
device:
  name: Sculpfun S30 Ultra 11W
  description: 11W diode laser engraver with 600x600mm work area, automatic
    air-assist and WiFi (Grbl_ESP32 telnet, port 23). Default host is the
    BT relay's mDNS name (rayforge-laser.local); change it in machine
    settings if the laser joins your home WiFi instead ($Radio/Mode=STA).
machine:
  driver: GrblTelnetDriver
  driver_args:
    host: rayforge-laser.local
    port: 23
    poll_status_while_running: false
    deadlock_detection: false
  gcode_precision: 3
  axis_extents:
  - 600.0
  - 600.0
  origin: bottom_left
  max_travel_speed: 10000
  max_cut_speed: 3000
  heads:
  - max_power: 1000
    frame_power_percent: 1.0
    focus_power_percent: 1.0
    spot_size_mm:
    - 0.08
    - 0.08
